# Backend — use glx for best performance
backend = "glx";
vsync = true;

# Rounded corners
corner-radius = 12;
rounded-corners-exclude = [
  "class_g = 'Polybar'"
];

# Shadows
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.4;
shadow-offset-x = -8;
shadow-offset-y = -8;

# Blur (requires picom-git for full support)
blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;

# Animations (picom-git only)
animations = true;
animation-for-open-window = "zoom";
animation-for-close-window = "zoom";
animation-stiffness = 200;
animation-dampening = 25;

# Fading
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 4;

# Opacity
inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 1.0;
